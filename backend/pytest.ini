[pytest]
# Test paths
testpaths = tests

# Asyncio mode for async test support
asyncio_mode = auto

# Default command line options
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Coverage options (use with --cov)
# Run with: pytest --cov=app --cov-report=term-missing --cov-report=html

# Test markers for categorizing tests
markers =
    unit: Pure unit tests (no database or external dependencies)
    integration: Tests requiring database
    slow: Tests that take longer than 1 second
    auth: Authentication-related tests
    api: API endpoint tests
    collector: Data collector tests

# Minimum version
minversion = 8.0

# Python file patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging configuration for tests
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Timeout for individual tests (requires pytest-timeout)
# timeout = 60
