# Comprehensive prompt template for IBM Granite 4.0 H Tiny (small model via LM Studio)
# Each prompt can specify its own model configuration

# Define reusable model configurations
models:
  granite-tiny:
    name: "ibm/granite-4-h-tiny"
    provider: "lmstudio"
    api_base: "http://127.0.0.1:1234/v1"
    api_key_env: ""  # No API key needed for local LM Studio
    tier: "small"
    max_tokens: 1500

# Define personas for daily summaries (used with {persona_instructions} placeholder)
# Personas provide formatting instructions to customize summary style
personas:
  executive: |
    Format this as an executive briefing for C-suite leaders:
    - Focus on strategic implications and business impact
    - Lead with bottom line: what matters most and why
    - Highlight risks, opportunities, and recommended actions
    - Use clear, decisive language
    - Keep technical details minimal unless business-critical

  technical: |
    Format this as a technical deep-dive for engineering and product teams:
    - Emphasize technical details, architectures, and methodologies
    - Include specific technologies, frameworks, and tools mentioned
    - Highlight technical challenges, innovations, and solutions
    - Provide context for technical decisions and trade-offs
    - Use precise technical terminology

  sales: |
    Format this as actionable sales intelligence for customer-facing teams:
    - Focus on customer pain points, needs, and buying signals
    - Highlight competitive movements and market positioning
    - Identify conversation starters and engagement opportunities
    - Emphasize what prospects care about right now
    - Include specific examples and talking points

  analyst: |
    Format this as a comprehensive analytical report:
    - Provide data-driven insights with supporting evidence
    - Include trend analysis and pattern recognition
    - Present multiple perspectives and interpretations
    - Quantify impact where possible
    - Structure with clear sections and logical flow

  brief: |
    Format this as a concise bullet-point briefing:
    - Use short, scannable bullet points only
    - Lead each section with the key takeaway
    - Eliminate all unnecessary words
    - Maximum 3-5 bullets per section
    - Focus on what's actionable or decision-worthy

# Each prompt references a model and provides its template
# ALL 9 REQUIRED PROMPTS MUST BE DEFINED
prompts:
  # ========================================
  # 1. STAGE 1: RELEVANCE CHECK (Fast Filter)
  # ========================================
  relevance_check:
    model: granite-tiny
    template: |
      CRITICAL TASK: Check if this article is SPECIFICALLY about "{customer_name}" the company.

      Title: {title}
      Content: {content}

      STEP 1: Look for EXACT company name "{customer_name}" in title or content.
      - If NOT found → is_relevant = false
      - If found → continue to STEP 2

      STEP 2: Verify it's the CORRECT company, not:
      - A different company with similar name
      - A competitor ({competitors_text})
      - A customer/user of {customer_name}
      - A nickname that could mean something else

      STEP 3: Check if it's REAL company news:
      ✓ YES (is_relevant = true):
      - Executive announcements from {customer_name}
      - Product launches by {customer_name}
      - Financial results of {customer_name}
      - Partnerships involving {customer_name}
      - Regulatory actions against {customer_name}

      ✗ NO (is_relevant = false):
      - Retail ads ("Get {customer_name} for $50")
      - How-to guides ("Use {customer_name} to...")
      - Articles about competitors ONLY
      - Customer complaints about {customer_name}
      - Articles where {customer_name} is mentioned once in passing

      IMPORTANT:
      - Competitor news is usually NOT relevant unless it directly impacts {customer_name}
      - Be STRICT: when in doubt, mark false

      Return ONLY JSON:
      {{
        "is_relevant": true/false,
        "reason": "one sentence why"
      }}

  # ========================================
  # 2. STAGE 2: CORE ANALYSIS (Main Processing)
  # ========================================
  core_analysis:
    model: granite-tiny
    template: |
      Analyze this article about {customer_name} for a technical sales team.

      Source Type: {source_type}
      Title: {title}
      Content: {content}

      Context:
      {keywords_text}
      {competitors_text}

      Return JSON with:

      1. SUMMARY (2-4 sentences): What happened and why it matters to sales
         - WHAT happened?
         - WHY does this matter to a sales professional?
         - WHAT are the implications?

      2. CATEGORY (pick ONE):
         product_update, financial, market_news, competitor, challenge, opportunity, leadership, partnership, advertisement, unrelated, other

      3. SENTIMENT: positive, negative, neutral, or mixed

      4. ENTITIES:
         - companies: ALL companies mentioned
         - technologies: Specific technologies/products mentioned
         - people: Executives and key personnel mentioned

      5. TAGS: 3-6 relevant tags for filtering/search

      6. PRIORITY_SCORE (0.0-1.0):
         - 0.8-1.0: Major threats, leadership changes, significant launches
         - 0.4-0.7: Product updates, industry news, partnerships
         - 0.1-0.3: Routine announcements
         - 0.0: Not relevant or spam

      Format as JSON:
      {{
        "summary": "...",
        "category": "...",
        "sentiment": "...",
        "entities": {{"companies": [], "technologies": [], "people": []}},
        "tags": [],
        "priority_score": 0.0
      }}

  # ========================================
  # 3. STAGE 3: BUSINESS INSIGHTS (High-Value Only)
  # ========================================
  business_insights:
    model: granite-tiny
    template: |
      Extract business insights from this intelligence about {customer_name}:

      Summary: {summary}
      Category: {category}
      Article Title: {title}

      Identify 0-3 of each (CRITICAL: 2-3 words MAXIMUM per item):

      PAIN_POINTS: Business problems or challenges
      Examples:
      ✓ GOOD: "Network outages", "Budget constraints", "Churn risk"
      ✗ BAD: "Customers experiencing service degradation" (TOO LONG!)

      OPPORTUNITIES: Sales or engagement opportunities
      Examples:
      ✓ GOOD: "Upsell opportunity", "Partnership potential", "Expansion plans"
      ✗ BAD: "Opportunity to position our superior reliability" (TOO LONG!)

      RULES:
      - Each item MUST be 2-3 words MAX
      - Use keywords/phrases, NOT sentences
      - Empty arrays if none found
      - DO NOT write long descriptions

      Return JSON:
      {{
        "pain_points": ["2-3 words", "2-3 words"],
        "opportunities": ["2-3 words", "2-3 words"]
      }}

  # ========================================
  # 4. DAILY SUMMARY (Executive Briefing)
  # ========================================
  daily_summary:
    model: granite-tiny
    template: |
      You are an executive intelligence briefing assistant. Generate a daily briefing for {customer_name} based on the intelligence collected in the last 24 hours.

      **Intelligence Overview:**
      - Total items collected: {total_items}
      - High priority items: {high_priority_count}
      - Categories: {categories}

      **Top Intelligence Items:**
      {items}

      **Your Task:**
      Generate a concise daily briefing summarizing the key intelligence collected today. Focus on:
      - Most important developments
      - Emerging trends and patterns
      - Notable competitor activities
      - Strategic opportunities and risks

      {persona_instructions}

      Keep the summary professional, actionable, and under 300 words.

      Write the briefing now:

  # ========================================
  # 5. RESEARCH: BASIC COMPANY INFO
  # ========================================
  research_basic_info:
    model: granite-tiny
    template: |
      Research the company "{customer_name}" and provide the following information.

      Return ONLY a JSON object (no explanatory text, no markdown formatting):

      {{
        "domain": "example.com",
        "description": "Brief one-sentence description",
        "stock_symbol": "SYMB",
        "industry": "Industry name",
        "linkedin_company_url": "https://linkedin.com/company/name",
        "twitter_handle": "@company"
      }}

      Rules:
      - Use null for any field where you're uncertain
      - Domain should be just the domain name (e.g., "telstra.com.au")
      - Stock symbol should include exchange if not US (e.g., "TLS.AX" for Australian stocks)
      - LinkedIn URL should be the full company page URL
      - Return ONLY the JSON object, nothing else

  # ========================================
  # 6. RESEARCH: EXECUTIVES
  # ========================================
  research_executives:
    model: granite-tiny
    template: |
      Find the top 4-6 C-level executives for {customer_name}.
      {web_context}

      Return ONLY a JSON array (no explanatory text, no markdown):

      [
        {{
          "name": "Full Name",
          "role": "CEO",
          "linkedin_url": "https://linkedin.com/in/profile",
          "notes": "Current as of [source]"
        }}
      ]

      Company LinkedIn: {linkedin_url}

      IMPORTANT RULES:
      - If leadership page content is provided above, prioritize executives from that CURRENT source
      - Only include C-level executives (CEO, CTO, CFO, COO, CMO, etc.)
      - Limit to 4-6 executives (quality over quantity)
      - For LinkedIn URLs, construct best-guess URLs based on name and company
      - Indicate source in notes (e.g., "From company website" or "From knowledge base - verify")
      - Return ONLY the JSON array, nothing else

  # ========================================
  # 7. RESEARCH: COMPETITORS
  # ========================================
  research_competitors:
    model: granite-tiny
    template: |
      List the top 5-8 competitors for {customer_name}{industry_context}.

      Focus on:
      - Direct competitors (same market/products)
      - Major players in the industry
      - Companies that sales teams would compete against

      Return ONLY the company names, one per line.
      Be concise - just the company name, no explanations.

      Example format:
      Competitor One
      Competitor Two
      Competitor Three

  # ========================================
  # 8. RESEARCH: KEYWORDS
  # ========================================
  research_keywords:
    model: granite-tiny
    template: |
      Generate monitoring keywords for {customer_name}.

      Domain: {domain}
      Description: {description}
      Industry: {industry}

      Return ONLY a JSON object (no explanatory text, no markdown):

      {{
        "keywords": ["keyword1", "keyword2", "...10-15 total"],
        "priority_keywords": ["priority1", "priority2", "...5-8 total"]
      }}

      Include:
      - General keywords: Company name variations, products, industry terms, acronyms
      - Priority keywords: High-impact terms (CEO, earnings, crisis terms, regulatory)

      Return ONLY the JSON object, nothing else.

  # ========================================
  # 9. RESEARCH: DATA SOURCES
  # ========================================
  research_sources:
    model: granite-tiny
    template: |
      Suggest data sources to monitor for {customer_name}{domain_hint}.

      Return ONLY a JSON object (no explanatory text, no markdown):

      {{
        "rss_feeds": [
          {{"url": "https://example.com/feed", "name": "Official Blog"}},
          {{"url": "https://example.com/news/rss", "name": "Newsroom"}}
        ],
        "subreddits": ["subreddit1", "subreddit2"]
      }}

      Include:
      1. RSS feeds - Newsroom, blog, or press release feeds (only if confident they exist)
      2. Subreddits - 3-5 relevant subreddits where this company/industry is discussed

      Use empty arrays if unsure. Return ONLY the JSON object, nothing else.
