# Comprehensive prompt template for Claude Sonnet 4 (all prompts use same frontier model)
# Each prompt can specify its own model configuration

# Define reusable model configurations
models:
  claude-sonnet:
    name: "claude-sonnet-4-5-20250929"
    provider: "anthropic"
    api_base: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    tier: "frontier"
    max_tokens: 1200
  
  claude-haiku:
    name: "claude-haiku-4-5-20251001"
    provider: "anthropic"
    api_base: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    tier: "frontier"
    max_tokens: 1200

# Each prompt references a model and provides its template
# ALL 7 REQUIRED PROMPTS MUST BE DEFINED
prompts:
  # ========================================
  # 1. INTELLIGENCE ANALYSIS (Article Processing)
  # ========================================
  intelligence_analysis:
    model: claude-haiku
    template: |
      You are an AI analyst helping a technical sales team monitor intelligence about {customer_name}.

      Your goal is to provide ACTIONABLE insights that help sales professionals:
      - Identify sales opportunities
      - Stay ahead of competitive threats
      - Understand customer challenges and needs
      - Prepare for conversations with relevant context

      ===== CONTEXT =====
      Customer Being Monitored: {customer_name}
      {keywords_text}
      {competitors_text}

      ===== CONTENT TO ANALYZE =====
      Source Type: {source_type}
      Title: {title}
      Content:
      {content}

      ===== ANALYSIS REQUIRED =====

      1. IS_RELEVANT (true/false): Is this actually about {customer_name} the company/organization?
         - FALSE if:
           * Retail advertisements or deals selling {customer_name}'s products/services
           * Consumer promotions, discounts, or offers from resellers/retailers
           * Price comparison articles or "best deal" listicles
           * General consumer advice articles
           * Sponsored content or affiliate marketing
           * About a different company/entity entirely
           * Spam or completely unrelated content
         - TRUE if:
           * Genuine news ABOUT {customer_name} as a company
           * Executive announcements, company initiatives, or policy changes
           * Industry analysis with substantive mention of {customer_name}
           * Competitor moves that directly impact {customer_name}
           * Regulatory/government actions affecting {customer_name}

      2. SUMMARY (2-4 sentences): Create an ACTION-ORIENTED summary that answers:
         - WHAT happened?
         - WHY does this matter to a sales professional?
         - WHAT are the implications (opportunities, risks, talking points)?

      3. CATEGORY: Choose ONE from:
         product_update, financial, market_news, competitor, challenge, opportunity, leadership, partnership, advertisement, unrelated, other

      4. SENTIMENT: positive, negative, neutral, or mixed

      5. ENTITIES: Extract mentioned entities (be thorough):
         - companies: ALL companies mentioned (including {customer_name} and competitors)
         - technologies: Specific technologies, products, platforms mentioned
         - people: Executives, leaders, key personnel mentioned

      6. TAGS: 3-6 highly relevant tags for filtering/search

      7. PAIN_POINTS_OPPORTUNITIES: Identify business pain points and sales opportunities:
         - pain_points: List 0-3 specific business challenges (3 WORDS MAXIMUM!!!)
           GOOD (2-3 words): "FTTN reliability issues", "Enterprise churn risk"
           BAD (too long): "Enterprise customers with strong ESG procurement criteria"
         - opportunities: List 0-3 specific sales opportunities (3 WORDS MAXIMUM!!!)
           GOOD (2-3 words): "FTTP upgrade campaign", "Bundle migration offers"
           BAD (too long): "Opportunity to align sales messaging with initiatives"

         ULTRA CRITICAL REQUIREMENTS:
         - Each entry MUST be 3 words or less - NO EXCEPTIONS!
         - Use ONLY keywords/noun phrases, NEVER full sentences
         - DO NOT combine multiple points into one entry - split them up!
         - Empty arrays are better than long entries

      8. PRIORITY_SCORE (0.0-1.0): How URGENT is this for the sales team?
         - 0.8-1.0: Major competitive threats, leadership changes, significant launches
         - 0.4-0.7: General product updates, industry news, minor partnerships
         - 0.1-0.3: Routine announcements with minimal impact
         - 0.0: Not relevant, advertisement, or spam

      Format response as JSON:
      {{
        "is_relevant": true,
        "summary": "...",
        "category": "...",
        "sentiment": "...",
        "entities": {{"companies": [], "technologies": [], "people": []}},
        "tags": [],
        "pain_points_opportunities": {{"pain_points": [], "opportunities": []}},
        "priority_score": 0.0
      }}

  # ========================================
  # 2. DAILY SUMMARY (Executive Briefing)
  # ========================================
  daily_summary:
    model: claude-sonnet
    template: |
      You are an executive intelligence briefing assistant. Generate a daily briefing for {customer_name} based on the intelligence collected in the last 24 hours.

      **Intelligence Overview:**
      - Total items collected: {total_items}
      - High priority items: {high_priority_count}
      - Categories: {categories}

      **Top Intelligence Items:**
      {items}

      **Your Task:**
      Generate a concise daily briefing summarizing the key intelligence collected today. Focus on:
      - Most important developments
      - Emerging trends and patterns
      - Notable competitor activities
      - Strategic opportunities and risks

      Keep the summary professional, actionable, and under 300 words.

      Write the briefing now:

  # ========================================
  # 3. RESEARCH: BASIC COMPANY INFO
  # ========================================
  research_basic_info:
    model: claude-haiku
    template: |
      Research the company "{customer_name}" and provide the following information.

      Return ONLY a JSON object (no explanatory text, no markdown formatting):

      {{
        "domain": "example.com",
        "description": "Brief one-sentence description",
        "stock_symbol": "SYMB",
        "industry": "Industry name",
        "linkedin_company_url": "https://linkedin.com/company/name",
        "twitter_handle": "@company"
      }}

      Rules:
      - Use null for any field where you're uncertain
      - Domain should be just the domain name (e.g., "telstra.com.au")
      - Stock symbol should include exchange if not US (e.g., "TLS.AX" for Australian stocks)
      - LinkedIn URL should be the full company page URL
      - Return ONLY the JSON object, nothing else

  # ========================================
  # 4. RESEARCH: EXECUTIVES
  # ========================================
  research_executives:
    model: claude-haiku
    template: |
      Find the top 4-6 C-level executives for {customer_name}.
      {web_context}

      Return ONLY a JSON array (no explanatory text, no markdown):

      [
        {{
          "name": "Full Name",
          "role": "CEO",
          "linkedin_url": "https://linkedin.com/in/profile",
          "notes": "Current as of [source]"
        }}
      ]

      Company LinkedIn: {linkedin_url}

      IMPORTANT RULES:
      - If leadership page content is provided above, prioritize executives from that CURRENT source
      - Only include C-level executives (CEO, CTO, CFO, COO, CMO, etc.)
      - Limit to 4-6 executives (quality over quantity)
      - For LinkedIn URLs, construct best-guess URLs based on name and company
      - Indicate source in notes (e.g., "From company website" or "From knowledge base - verify")
      - Return ONLY the JSON array, nothing else

  # ========================================
  # 5. RESEARCH: COMPETITORS
  # ========================================
  research_competitors:
    model: claude-haiku
    template: |
      List the top 5-8 competitors for {customer_name}{industry_context}.

      Focus on:
      - Direct competitors (same market/products)
      - Major players in the industry
      - Companies that sales teams would compete against

      Return ONLY the company names, one per line.
      Be concise - just the company name, no explanations.

      Example format:
      Competitor One
      Competitor Two
      Competitor Three

  # ========================================
  # 6. RESEARCH: KEYWORDS
  # ========================================
  research_keywords:
    model: claude-haiku
    template: |
      Generate monitoring keywords for {customer_name}.

      Domain: {domain}
      Description: {description}
      Industry: {industry}

      Return ONLY a JSON object (no explanatory text, no markdown):

      {{
        "keywords": ["keyword1", "keyword2", "...10-15 total"],
        "priority_keywords": ["priority1", "priority2", "...5-8 total"]
      }}

      Include:
      - General keywords: Company name variations, products, industry terms, acronyms
      - Priority keywords: High-impact terms (CEO, earnings, crisis terms, regulatory)

      Return ONLY the JSON object, nothing else.

  # ========================================
  # 7. RESEARCH: DATA SOURCES
  # ========================================
  research_sources:
    model: claude-haiku
    template: |
      Suggest data sources to monitor for {customer_name}{domain_hint}.

      Return ONLY a JSON object (no explanatory text, no markdown):

      {{
        "rss_feeds": [
          {{"url": "https://example.com/feed", "name": "Official Blog"}},
          {{"url": "https://example.com/news/rss", "name": "Newsroom"}}
        ],
        "subreddits": ["subreddit1", "subreddit2"]
      }}

      Include:
      1. RSS feeds - Newsroom, blog, or press release feeds (only if confident they exist)
      2. Subreddits - 3-5 relevant subreddits where this company/industry is discussed

      Use empty arrays if unsure. Return ONLY the JSON object, nothing else.
