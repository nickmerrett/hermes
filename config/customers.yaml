# Customer Intelligence Configuration
# Add customers you want to monitor here

customers:
  - name: "NBN Co"
    domain: "nbnco.com.au"
    description: "Australia's National Broadband Network infrastructure provider"

    # Keywords to search for in news and social media
    keywords:
      - "NBN Co"
      - "NBN"
      - "National Broadband Network"
      - "nbnco"
      - "NBN Australia"
      - "broadband"
      - "FTTP"
      - "HFC"
      - "ACMA"
      - "ACAN"
      - "Senate Estimates"

    # Competitor companies to monitor
    competitors:
      - "Telstra"
      - "Optus"
      - "TPG Telecom"
      - "Aussie Broadband"
      - "Vocus"
      - "Starlink"
      - "5G"

    # Stock symbol (if publicly traded)
    stock_symbol: null  # Government-owned, not publicly traded

    # RSS/Atom feeds to monitor
    rss_feeds: []
      # Google News feeds now auto-generated by google_news_collector

    # Social media handles (optional)
    twitter_handle: "@nbn_australia"
    linkedin_company_id: "nbn-co-limited"
    linkedin_company_url: "https://www.linkedin.com/company/nbn-co-limited"

    # LinkedIn user profiles to monitor (optional)
    # Add profiles of key people: executives, competitors, industry influencers
    linkedin_user_profiles:
      # NBN Co Leadership
      - profile_url: "https://www.linkedin.com/in/ellie-sweeney-6659363/"
        name: "Ellie Sweeney"
        role: "CEO, NBN Co"
        notes: "CEO appointed Dec 2024 - track strategic direction and announcements"

    github_org: null
    github_repos: []

    # Collection preferences
    collection_config:
      # Core sources (enabled by default)
      news_enabled: true
      stock_enabled: false  # Not publicly traded
      rss_enabled: true
      australian_news_enabled: true  # Critical for Australian company
      google_news_enabled: true  # Auto-generates searches for company, competitors, keywords

      # Australian News Sources (optional - defaults used if not specified)
      # Customize which Australian news sources to monitor:
      # australian_news_sources:
      #   - name: "The Guardian Australia"
      #     key: "guardian_au"  # Optional: custom identifier
      #     feeds:
      #       - "https://www.theguardian.com/australia-news/rss"
      #       - "https://www.theguardian.com/australia-news/business/rss"
      #       - "https://www.theguardian.com/technology/rss"

      # Web Scraping (for sources without RSS feeds)
      # Uses trafilatura to intelligently extract full article content
      web_scrape_sources:
        - name: "NBN Co Newsroom"
          url: "https://www.nbnco.com.au/corporate-information/about-nbn-co/newsroom/articles"
          selectors:
            article_list: "li"  # Container for each article
            link: "a"             # Link to full article
          max_articles: 20
          extract_full_content: true # (default - uses trafilatura to fetch full article)
        - name: "Whirlpool Broadband News"
          url: "https://whirlpool.net.au"
          selectors:
            article_list: "div.article"        # Container for each news article
            link: "h4 a"                       # Link to full article
          max_articles: 30
          extract_full_content: true # (default - uses trafilatura to fetch full article)

      # Social media & community (disabled by default, enable as needed)
      hackernews_enabled: false
      github_enabled: false
      twitter_enabled: false
      linkedin_enabled: true
      linkedin_user_enabled: true  # Monitor individual LinkedIn user profiles - ENABLED (Playwright-based)
      pressrelease_enabled: false

      # Reddit-specific config
      reddit_enabled: true
      reddit_subreddits:
        - "australia"
        - "nbn"
        - "auscorp"

      # Priority keywords (higher scoring for these terms)
      priority_keywords:
        - "ACMA"
        - "rollout"
        - "upgrade"
        - "outage"
        - "network"
        - "fibre"
        - "FTTP"
        - "FTTN"
        - "HFC"
        - "wireless"
        - "satellite"
        - "connectivity"
        - "infrastructure"
        - "broadband"
        - "fixed wireless"
        - "FTTC"
        - "Nokia"
        - "Ericsson"
        - "Commscope"

    # Notes for context
    notes: "Australian government-owned wholesale broadband provider"

